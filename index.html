<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan 2027 · رمضان كريم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a96e;
    --gold-light: #e2c98a;
    --gold-dim: rgba(201,169,110,0.35);
    --cream: #f0e6c8;
    --cream-dim: rgba(240,230,200,0.6);
    --teal: #5ba890;
    --sky: #8aafc4;
    --bg-deep: #060d1a;
    --bg-mid: #0a1628;
    --bg-card: rgba(255,255,255,0.04);
  }

  html, body {
    width: 100%;
    min-height: 100%;
  }

  body {
    background: var(--bg-deep);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* ── Canvas background ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Geometric ornament rings ── */
  .ring {
    position: fixed;
    border-radius: 50%;
    border: 0.5px solid var(--gold-dim);
    pointer-events: none;
    z-index: 0;
    animation: ring-pulse 8s ease-in-out infinite;
  }
  .ring-1 { width: 600px; height: 600px; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 0s; }
  .ring-2 { width: 900px; height: 900px; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 2s; opacity: 0.5; }
  .ring-3 { width: 1200px; height: 1200px; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 4s; opacity: 0.25; }

  @keyframes ring-pulse {
    0%, 100% { opacity: 0.15; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 0.3; transform: translate(-50%,-50%) scale(1.02); }
  }

  /* ── Main container ── */
  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(2rem, 8vw, 4rem) clamp(1.25rem, 6vw, 2.5rem);
    gap: 0;
  }

  /* ── Crescent & lantern row ── */
  .top-ornament {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: clamp(24px, 6vw, 56px);
    margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
    animation: sway 6s ease-in-out infinite;
  }

  @keyframes sway {
    0%, 100% { transform: rotate(-0.8deg); }
    50% { transform: rotate(0.8deg); }
  }

  .lantern {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .lantern-cord {
    width: 1px;
    height: clamp(16px, 4vw, 24px);
    background: var(--gold);
    opacity: 0.5;
  }

  .lantern-body {
    width: clamp(22px, 5.5vw, 30px);
    height: clamp(30px, 7.5vw, 42px);
    border-radius: 50% 50% 38% 38% / 38% 38% 50% 50%;
    position: relative;
    animation: lantern-glow 3s ease-in-out infinite;
  }

  .lantern-body::after {
    content: '';
    position: absolute;
    inset: 3px;
    border-radius: inherit;
    background: rgba(255,255,255,0.18);
  }

  .lantern-fringe {
    width: 1.5px;
    height: clamp(8px, 2.5vw, 14px);
    opacity: 0.7;
  }

  .la .lantern-body { background: #d4813a; box-shadow: 0 0 14px #d4813a77, 0 0 30px #d4813a33; }
  .la .lantern-fringe { background: #d4813a; }
  .lb .lantern-body { background: var(--gold); box-shadow: 0 0 14px #c9a96e77, 0 0 30px #c9a96e33; }
  .lb .lantern-fringe { background: var(--gold); }
  .lc .lantern-body { background: var(--teal); box-shadow: 0 0 14px #5ba89077, 0 0 30px #5ba89033; }
  .lc .lantern-fringe { background: var(--teal); }

  @keyframes lantern-glow {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.35); }
  }

  .crescent-wrap {
    padding-bottom: clamp(8px, 2vw, 12px);
  }

  .crescent-svg {
    width: clamp(44px, 11vw, 62px);
    height: clamp(44px, 11vw, 62px);
    animation: float 5s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(-2deg); }
    50% { transform: translateY(-7px) rotate(2deg); }
  }

  /* ── Arabic ── */
  .arabic {
    font-family: 'Amiri', serif;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.02em;
    line-height: 1.3;
    margin-bottom: 0.4rem;
    opacity: 0;
    animation: fade-up 1s ease forwards 0.3s;
  }

  /* ── Main heading ── */
  .main-heading {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.2rem, 8vw, 4rem);
    color: var(--cream);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 0.3rem;
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fade-up 1s ease forwards 0.5s;
  }

  .main-heading em {
    font-style: italic;
    color: var(--gold-light);
  }

  /* ── Sub label ── */
  .sub-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    color: var(--sky);
    text-align: center;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
    opacity: 0;
    animation: fade-up 1s ease forwards 0.7s;
  }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 340px;
    margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
    opacity: 0;
    animation: fade-in 1s ease forwards 0.9s;
  }

  .div-line {
    flex: 1;
    height: 0.5px;
    background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
  }

  .div-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ── Countdown ── */
  .countdown {
    display: flex;
    align-items: flex-start;
    gap: clamp(8px, 3vw, 20px);
    margin-bottom: clamp(1.8rem, 6vw, 3rem);
    opacity: 0;
    animation: fade-up 1s ease forwards 1.1s;
  }

  .cd-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: clamp(52px, 15vw, 76px);
  }

  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 9vw, 4rem);
    color: var(--cream);
    line-height: 1;
    letter-spacing: -0.02em;
    min-width: 1.8ch;
    text-align: center;
    transition: transform 0.2s ease;
  }

  .cd-num.tick {
    animation: num-tick 0.3s ease;
  }

  @keyframes num-tick {
    0% { transform: translateY(-6px); opacity: 0.5; }
    100% { transform: translateY(0); opacity: 1; }
  }

  .cd-label {
    font-family: 'Amiri', serif;
    font-size: clamp(0.65rem, 2vw, 0.78rem);
    color: var(--sky);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
  }

  .cd-sep {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 7vw, 3.2rem);
    color: rgba(201,169,110,0.3);
    line-height: 1;
    margin-top: 2px;
    flex-shrink: 0;
  }

  /* ── Quote ── */
  .quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.95rem, 3vw, 1.2rem);
    font-style: italic;
    color: rgba(240,230,200,0.55);
    text-align: center;
    max-width: 420px;
    line-height: 1.65;
    letter-spacing: 0.02em;
    margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
    opacity: 0;
    animation: fade-up 1s ease forwards 1.3s;
  }

  /* ── Bottom geo ornament ── */
  .geo-ornament {
    display: flex;
    align-items: center;
    gap: clamp(6px, 2vw, 10px);
    opacity: 0;
    animation: fade-in 1s ease forwards 1.5s;
  }

  .geo-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--gold-dim);
  }

  .geo-dot.lg {
    width: 5px;
    height: 5px;
    background: rgba(201,169,110,0.5);
  }

  .geo-star {
    width: 10px;
    height: 10px;
    position: relative;
    flex-shrink: 0;
  }

  /* ── Animations ── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Footer ── */
  .page-footer {
    position: fixed;
    bottom: 1.2rem;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.65rem, 2vw, 0.78rem);
    color: rgba(138,175,196,0.4);
    letter-spacing: 0.12em;
    z-index: 1;
  }

  /* ── Responsive tweaks ── */
  @media (max-height: 600px) {
    .ring-1, .ring-2, .ring-3 { display: none; }
    .page { justify-content: flex-start; padding-top: 1rem; }
    .top-ornament { margin-bottom: 1rem; }
  }

  @media (max-width: 360px) {
    .countdown { gap: 6px; }
    .cd-sep { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="ring ring-1"></div>
<div class="ring ring-2"></div>
<div class="ring ring-3"></div>

<main class="page">

  <!-- Lanterns + crescent -->
  <div class="top-ornament">
    <div class="lantern la">
      <div class="lantern-cord"></div>
      <div class="lantern-body"></div>
      <div class="lantern-fringe"></div>
    </div>
    <div class="lantern lb">
      <div class="lantern-cord"></div>
      <div class="lantern-body"></div>
      <div class="lantern-fringe"></div>
    </div>
    <div class="crescent-wrap">
      <svg class="crescent-svg" viewBox="0 0 62 62" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M44 12 C44 30 30 44 12 44 C15 52 23 57 32 57 C46 57 58 45 58 31 C58 21 52 13 44 12Z" fill="#c9a96e" opacity="0.92"/>
        <circle cx="42" cy="22" r="3.5" fill="#f0e6c8" opacity="0.65"/>
        <circle cx="51" cy="17" r="1.8" fill="#f0e6c8" opacity="0.4"/>
        <circle cx="46" cy="14" r="1.2" fill="#f0e6c8" opacity="0.3"/>
      </svg>
    </div>
    <div class="lantern lc">
      <div class="lantern-cord"></div>
      <div class="lantern-body"></div>
      <div class="lantern-fringe"></div>
    </div>
    <div class="lantern lb" style="animation-delay:0.4s">
      <div class="lantern-cord"></div>
      <div class="lantern-body"></div>
      <div class="lantern-fringe"></div>
    </div>
  </div>

  <p class="arabic">رمضان كريم ١٤٤٨</p>

  <h1 class="main-heading">Ramadan <em>2027</em><br>is Coming</h1>

  <p class="sub-label">7 February 2027 &nbsp;·&nbsp; 1 Ramadan 1448H</p>

  <div class="divider">
    <div class="div-line"></div>
    <div class="div-diamond"></div>
    <div class="div-line"></div>
  </div>

  <div class="countdown">
    <div class="cd-block">
      <div class="cd-num" id="cd-d">—</div>
      <div class="cd-label">Days</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <div class="cd-num" id="cd-h">—</div>
      <div class="cd-label">Hours</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <div class="cd-num" id="cd-m">—</div>
      <div class="cd-label">Mins</div>
    </div>
    <div class="cd-sep">:</div>
    <div class="cd-block">
      <div class="cd-num" id="cd-s">—</div>
      <div class="cd-label">Secs</div>
    </div>
  </div>

  <p class="quote">
    May this blessed month bring you peace, reflection,<br>
    and the joy of togetherness.
  </p>

  <div class="geo-ornament">
    <div class="geo-dot"></div>
    <div class="geo-dot lg"></div>
    <svg class="geo-star" viewBox="0 0 10 10"><polygon points="5,0 6.12,3.45 9.76,3.45 6.88,5.55 7.94,9 5,6.9 2.06,9 3.12,5.55 0.24,3.45 3.88,3.45" fill="rgba(201,169,110,0.5)"/></svg>
    <div class="geo-dot lg"></div>
    <div class="geo-dot"></div>
    <div class="geo-dot"></div>
    <svg class="geo-star" viewBox="0 0 10 10"><polygon points="5,0 6.12,3.45 9.76,3.45 6.88,5.55 7.94,9 5,6.9 2.06,9 3.12,5.55 0.24,3.45 3.88,3.45" fill="rgba(201,169,110,0.35)"/></svg>
    <div class="geo-dot"></div>
    <div class="geo-dot lg"></div>
    <div class="geo-dot"></div>
  </div>

</main>

<footer class="page-footer">Ramadan 1448H &nbsp;·&nbsp; 7 February 2027</footer>

<script>
  /* ── Star canvas ── */
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const count = Math.min(160, Math.floor((canvas.width * canvas.height) / 5000));
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() < 0.15 ? 1.5 : Math.random() < 0.4 ? 1 : 0.6,
        baseAlpha: 0.2 + Math.random() * 0.7,
        alpha: 0,
        speed: 0.005 + Math.random() * 0.015,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.alpha = s.baseAlpha * (0.4 + 0.6 * Math.abs(Math.sin(t * s.speed + s.phase)));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${s.alpha.toFixed(3)})`;
      ctx.fill();
    }
  }

  let raf;
  function loop(t) {
    drawStars(t * 0.001);
    raf = requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  requestAnimationFrame(loop);

  /* ── Countdown ── */
  const EID = new Date('2027-02-07T00:00:00');
  const els = {
    d: document.getElementById('cd-d'),
    h: document.getElementById('cd-h'),
    m: document.getElementById('cd-m'),
    s: document.getElementById('cd-s')
  };
  const prev = { d: null, h: null, m: null, s: null };

  function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

  function tick() {
    const diff = EID - Date.now();
    if (diff <= 0) {
      for (const k in els) els[k].textContent = '00';
      return;
    }
    const vals = {
      d: Math.floor(diff / 86400000),
      h: Math.floor((diff % 86400000) / 3600000),
      m: Math.floor((diff % 3600000) / 60000),
      s: Math.floor((diff % 60000) / 1000)
    };
    for (const k in vals) {
      const str = pad(vals[k]);
      if (str !== prev[k]) {
        els[k].textContent = str;
        els[k].classList.remove('tick');
        void els[k].offsetWidth;
        els[k].classList.add('tick');
        prev[k] = str;
      }
    }
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
